name: Release Lex Scripta Skill

on:
  pull_request:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Validate canonical skill package
        run: python3 .github/scripts/validate_skill.py

  release:
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    needs: validate
    permissions:
      contents: write
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Validate canonical skill package
        run: python3 .github/scripts/validate_skill.py

      - name: Package release assets
        run: bash .github/scripts/package_release.sh "${GITHUB_REF_NAME#v}" "${GITHUB_REPOSITORY}" "${RUNNER_TEMP}/dist"

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          body_path: ${{ runner.temp }}/dist/RELEASE_NOTES.md
          files: |
            ${{ runner.temp }}/dist/*.tar.gz
            ${{ runner.temp }}/dist/*.zip
            ${{ runner.temp }}/dist/SHA256SUMS.txt
